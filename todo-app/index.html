<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List App - Local Storage</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1>📝 My To-Do List</h1>
                <button class="theme-toggle" id="themeToggle" title="Toggle dark mode">🌙</button>
            </div>
        </header>

        <!-- Main App -->
        <main class="app">
            <!-- Input Section -->
            <section class="input-section">
                <div class="input-group">
                    <input 
                        type="text" 
                        id="taskInput" 
                        placeholder="Add a new task..."
                        class="task-input"
                        autocomplete="off"
                    >
                    <select id="prioritySelect" class="priority-select">
                        <option value="medium">Medium</option>
                        <option value="high">High</option>
                        <option value="low">Low</option>
                    </select>
                    <input type="date" id="dueDate" class="due-date-input">
                    <button id="addBtn" class="btn btn-primary">Add Task</button>
                </div>
            </section>

            <!-- Search and Filter Section -->
            <section class="controls-section">
                <div class="search-bar">
                    <input 
                        type="text" 
                        id="searchInput" 
                        placeholder="Search tasks..."
                        class="search-input"
                    >
                    <button id="clearSearch" class="btn-clear">✕</button>
                </div>

                <div class="filter-buttons">
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="active">Active</button>
                    <button class="filter-btn" data-filter="completed">Completed</button>
                </div>

                <div class="action-buttons">
                    <button id="undoBtn" class="btn btn-small" title="Undo (Ctrl+Z)">↶ Undo</button>
                    <button id="redoBtn" class="btn btn-small" title="Redo (Ctrl+Y)">↷ Redo</button>
                    <button id="exportBtn" class="btn btn-small" title="Export as JSON">⬇ Export</button>
                    <button id="importBtn" class="btn btn-small" title="Import from JSON">⬆ Import</button>
                </div>
            </section>

            <!-- Stats Section -->
            <section class="stats-section">
                <div class="stat">
                    <span class="stat-label">Total:</span>
                    <span class="stat-value" id="totalCount">0</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Active:</span>
                    <span class="stat-value" id="activeCount">0</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Completed:</span>
                    <span class="stat-value" id="completedCount">0</span>
                </div>
            </section>

            <!-- Tasks List -->
            <section class="tasks-section">
                <ul id="taskList" class="task-list">
                    <!-- Tasks will be inserted here -->
                </ul>
                <div id="emptyState" class="empty-state">
                    <p>📭 No tasks yet. Add one to get started!</p>
                </div>
            </section>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>✨ All data is stored locally in your browser • No server required</p>
        </footer>
    </div>

    <!-- Hidden file input for import -->
    <input type="file" id="importFile" accept=".json" style="display: none;">

    <script src="script.js"></script>
</body>
</html>
